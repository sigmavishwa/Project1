<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f4e8;
      --muted: #c6c0ad;
      --gold: #f4c76b;
      --rose: #e66a8b;
      --teal: #38c6b7;
      --night: #101018;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(230, 106, 139, 0.32), transparent 30%),
        radial-gradient(circle at 82% 76%, rgba(56, 198, 183, 0.28), transparent 34%),
        linear-gradient(135deg, #151521 0%, #0c1117 54%, #181020 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 42vmin;
      aspect-ratio: 1;
      border: 1px solid rgba(244, 199, 107, 0.32);
      border-radius: 36% 64% 61% 39% / 42% 33% 67% 58%;
      filter: drop-shadow(0 0 34px rgba(244, 199, 107, 0.18));
      animation: drift 18s linear infinite;
      pointer-events: none;
    }

    body::before {
      top: 8%;
      left: 7%;
    }

    body::after {
      right: 5%;
      bottom: 7%;
      width: 34vmin;
      border-color: rgba(56, 198, 183, 0.28);
      animation-direction: reverse;
      animation-duration: 22s;
    }

    main {
      width: min(88vw, 780px);
      padding: clamp(32px, 8vw, 72px);
      position: relative;
      text-align: center;
      border: 1px solid rgba(248, 244, 232, 0.16);
      background: rgba(16, 16, 24, 0.62);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(18px);
    }

    main::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(244, 199, 107, 0.22);
      pointer-events: none;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--gold);
      font: 700 0.78rem/1.2 system-ui, sans-serif;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 16vw, 9rem);
      line-height: 0.88;
      font-weight: 400;
      text-wrap: balance;
      text-shadow:
        0 2px 0 rgba(244, 199, 107, 0.5),
        0 24px 42px rgba(0, 0, 0, 0.5);
    }

    .world {
      display: inline-block;
      font-style: italic;
      background: linear-gradient(100deg, var(--gold), var(--rose), var(--teal));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      max-width: 520px;
      margin: 28px auto 0;
      color: var(--muted);
      font: 1.04rem/1.8 system-ui, sans-serif;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sparkles span {
      position: absolute;
      width: 7px;
      aspect-ratio: 1;
      border-radius: 999px;
      background: var(--gold);
      box-shadow: 0 0 18px var(--gold);
      animation: twinkle 2.7s ease-in-out infinite;
    }

    .sparkles span:nth-child(1) {
      top: 16%;
      left: 14%;
    }

    .sparkles span:nth-child(2) {
      top: 24%;
      right: 18%;
      animation-delay: 0.8s;
      background: var(--teal);
      box-shadow: 0 0 18px var(--teal);
    }

    .sparkles span:nth-child(3) {
      left: 22%;
      bottom: 18%;
      animation-delay: 1.4s;
      background: var(--rose);
      box-shadow: 0 0 18px var(--rose);
    }

    @keyframes drift {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.3;
        transform: scale(0.7);
      }

      50% {
        opacity: 1;
        transform: scale(1.35);
      }
    }

    @media (max-width: 540px) {
      main {
        width: min(92vw, 420px);
        padding: 42px 24px;
      }

      p {
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Fancy Hello World page">
    <div class="sparkles" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <p class="kicker">A tiny first page</p>
    <h1>Hello <span class="world">World</span></h1>
    <p>
      A luminous little greeting, dressed in glass, gold, and slow-moving geometry.
    </p>
  </main>
</body>
</html>
