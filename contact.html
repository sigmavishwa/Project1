<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8f4e8;
      --muted: #c6c0ad;
      --gold: #f4c76b;
      --rose: #e66a8b;
      --teal: #38c6b7;
      --night: #101018;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 92px 18px 36px;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(230, 106, 139, 0.32), transparent 30%),
        radial-gradient(circle at 84% 74%, rgba(56, 198, 183, 0.28), transparent 34%),
        linear-gradient(135deg, #151521 0%, #0c1117 54%, #181020 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      width: 42vmin;
      aspect-ratio: 1;
      border: 1px solid rgba(244, 199, 107, 0.32);
      border-radius: 36% 64% 61% 39% / 42% 33% 67% 58%;
      filter: drop-shadow(0 0 34px rgba(244, 199, 107, 0.18));
      animation: drift 18s linear infinite;
      pointer-events: none;
    }

    body::before {
      top: 8%;
      left: 7%;
    }

    body::after {
      right: 5%;
      bottom: 7%;
      width: 34vmin;
      border-color: rgba(56, 198, 183, 0.28);
      animation-direction: reverse;
      animation-duration: 22s;
    }

    nav {
      position: fixed;
      top: 22px;
      left: 50%;
      z-index: 5;
      display: flex;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(248, 244, 232, 0.16);
      background: rgba(16, 16, 24, 0.66);
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.28);
      transform: translateX(-50%);
      backdrop-filter: blur(18px);
    }

    nav a {
      padding: 10px 14px;
      color: var(--muted);
      font: 700 0.78rem/1 system-ui, sans-serif;
      letter-spacing: 0.1em;
      text-decoration: none;
      text-transform: uppercase;
      transition: color 180ms ease, background 180ms ease;
    }

    nav a:hover,
    nav a[aria-current="page"] {
      color: var(--night);
      background: var(--gold);
    }

    main {
      width: min(88vw, 840px);
      padding: clamp(32px, 7vw, 68px);
      position: relative;
      border: 1px solid rgba(248, 244, 232, 0.16);
      background: rgba(16, 16, 24, 0.62);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(18px);
    }

    main::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(244, 199, 107, 0.22);
      pointer-events: none;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--gold);
      font: 700 0.78rem/1.2 system-ui, sans-serif;
      letter-spacing: 0.28em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 720px;
      margin: 0;
      font-size: clamp(3.6rem, 12vw, 7.5rem);
      line-height: 0.92;
      font-weight: 400;
      text-shadow: 0 24px 42px rgba(0, 0, 0, 0.5);
    }

    .accent {
      font-style: italic;
      background: linear-gradient(100deg, var(--gold), var(--rose), var(--teal));
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      max-width: 640px;
      margin: 28px 0 0;
      color: var(--muted);
      font: 1.05rem/1.8 system-ui, sans-serif;
    }

    form {
      display: grid;
      gap: 14px;
      margin-top: 34px;
      font-family: system-ui, sans-serif;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--ink);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(248, 244, 232, 0.18);
      padding: 14px 16px;
      background: rgba(248, 244, 232, 0.08);
      color: var(--ink);
      font: 1rem/1.4 system-ui, sans-serif;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(244, 199, 107, 0.16);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    button {
      justify-self: start;
      border: 0;
      padding: 14px 22px;
      background: linear-gradient(100deg, var(--gold), var(--rose));
      color: var(--night);
      cursor: pointer;
      font: 800 0.82rem/1 system-ui, sans-serif;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font: 0.92rem/1.6 system-ui, sans-serif;
    }

    @keyframes drift {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 680px) {
      nav {
        width: calc(100vw - 28px);
        justify-content: center;
        flex-wrap: wrap;
      }

      main {
        width: min(92vw, 480px);
        padding: 42px 24px;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Main navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="contact.html" aria-current="page">Contact Us</a>
  </nav>
  <main aria-label="Contact Us page">
    <p class="kicker">Contact us</p>
    <h1>Send a little <span class="accent">signal</span>.</h1>
    <p>
      Have a bright idea, a question, or a note to share? Drop it below and let
      the conversation begin.
    </p>
    <form>
      <label>
        Name
        <input type="text" name="name" placeholder="Your name">
      </label>
      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com">
      </label>
      <label>
        Message
        <textarea name="message" placeholder="Tell us what is on your mind"></textarea>
      </label>
      <button type="submit">Send Message</button>
    </form>
    <div class="note">Demo form only. It is ready for styling and can be connected later.</div>
  </main>
</body>
</html>
